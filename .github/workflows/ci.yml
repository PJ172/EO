name: CI — Lint, Type Check & Unit Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint + Type Check + Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: eoffice_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/eoffice_test?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret-key
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: apps/api

      - name: Run Prisma Migrations
        run: npx prisma db push --skip-generate
        working-directory: apps/api

      # Backend checks
      - name: Type Check — Backend
        run: npx tsc --noEmit
        working-directory: apps/api

      - name: Unit Tests — Backend
        run: npx jest --forceExit --ci --coverage
        working-directory: apps/api

      # Frontend checks
      - name: Type Check — Frontend
        run: npx tsc --noEmit
        working-directory: apps/web
        continue-on-error: true  # Known pre-existing TS errors in helpdesk

      - name: Lint — Frontend
        run: npx next lint
        working-directory: apps/web
        continue-on-error: true

      # Summary
      - name: Upload Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: apps/api/coverage/
          retention-days: 7
