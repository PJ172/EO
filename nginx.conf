# =============================================================
# eOffice Nginx Reverse Proxy Configuration (Production)
# =============================================================
# Usage:
#   1. Copy to /etc/nginx/sites-available/eoffice
#   2. sudo ln -s /etc/nginx/sites-available/eoffice /etc/nginx/sites-enabled/
#   3. sudo nginx -t && sudo systemctl reload nginx
#
# Windows (IIS alternative):
#   Sử dụng IIS → URL Rewrite → Reverse Proxy
#   Hoặc cài Nginx for Windows: https://nginx.org/en/download.html
# =============================================================

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

# Upstream API (PM2 cluster trên port 3001)
upstream eoffice_api {
    server 127.0.0.1:3001;
    keepalive 32;
}

# Upstream Web (Next.js trên port 3000)
upstream eoffice_web {
    server 127.0.0.1:3000;
    keepalive 16;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name eoffice.your-domain.com;
    return 301 https://$server_name$request_uri;
}

# HTTPS Server
server {
    listen 443 ssl http2;
    server_name eoffice.your-domain.com;

    # =========================
    # SSL Configuration
    # =========================
    ssl_certificate     /etc/ssl/certs/eoffice.crt;
    ssl_certificate_key /etc/ssl/private/eoffice.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # =========================
    # Security Headers
    # =========================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # =========================
    # Gzip Compression
    # =========================
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               application/vnd.ms-fontobject application/x-font-ttf font/opentype
               image/svg+xml image/x-icon;

    # =========================
    # API Proxy (/api/*)
    # =========================
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://eoffice_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;  # Excel export có thể chậm

        # Body size (file upload)
        client_max_body_size 50M;
    }

    # Login endpoint — rate limit chặt hơn
    location /api/v1/auth/login {
        limit_req zone=login_limit burst=3 nodelay;

        proxy_pass http://eoffice_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uploads static files
    location /uploads/ {
        proxy_pass http://eoffice_api;
        proxy_set_header Host $host;

        # Cache static uploads
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Swagger docs — chỉ bật trong development
    # Uncomment dòng deny all để tắt trong production
    location /api/docs {
        # deny all;
        proxy_pass http://eoffice_api;
        proxy_set_header Host $host;
    }

    # =========================
    # Web App Proxy (everything else)
    # =========================
    location / {
        proxy_pass http://eoffice_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Next.js static assets — cache
    location /_next/static/ {
        proxy_pass http://eoffice_web;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Health check endpoint
    location /health {
        proxy_pass http://eoffice_api;
        proxy_set_header Host $host;
        access_log off;
    }

    # Error pages
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
